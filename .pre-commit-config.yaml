repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-toml
    -   id: check-added-large-files
        args: ['--maxkb=500']
    -   id: check-merge-conflict
    -   id: mixed-line-ending
        args: [--fix=lf]
    -   id: check-case-conflict
    -   id: detect-private-key
    -   id: check-ast              # Validate Python syntax before committing
    -   id: debug-statements       # Catch forgotten pdb/breakpoint() calls

# ruff replaces black, flake8, and isort in a single fast pass
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
    -   id: ruff                   # Lint + auto-fix (includes isort via "I" rules)
        args: [--fix, --exit-non-zero-on-fix]
    -   id: ruff-format            # Format (black-compatible)

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
    -   id: mypy
        additional_dependencies: [types-requests]
        args: [--ignore-missing-imports]
