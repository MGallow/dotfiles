name: Test dotfiles installation

on:
  push:
    branches: [main, master, "claude/*"]
  pull_request:
    branches: [main, master]

jobs:
  # ── Secret scanning ─────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits

      - name: Install gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-git=false

  # ── Shell script linting ────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint all shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "*.zsh" \) \
            -not -path "./.git/*" \
            -print0 | xargs -0 shellcheck --severity=warning || true

          # Lint scripts without extensions by checking the shebang line
          for f in script/bootstrap script/install script/validate script/unlink script/verify bin/dot bin/c bin/e bin/zssh; do
            [ -f "$f" ] && shellcheck --severity=warning "$f" || true
          done

  # ── Full macOS install test ─────────────────────────────────────────────────
  install-macos:
    name: Full install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15   # Sequoia — Apple Silicon (M-series runner)
          - macos-14   # Sonoma  — Apple Silicon (M-series runner)
    env:
      # Non-interactive git config (read by script/bootstrap)
      GIT_AUTHOR_NAME: "CI Test User"
      GIT_AUTHOR_EMAIL: "ci@example.com"
      # Skip tools that require interactive browser auth or paid subscriptions
      DOTFILES_CI: "1"
      # Opt into Node.js 24 for actions (Node.js 20 deprecated June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout dotfiles
        uses: actions/checkout@v4
        with:
          path: .dotfiles

      - name: Symlink repo to ~/.dotfiles
        run: |
          mkdir -p "$HOME"
          ln -sfn "$GITHUB_WORKSPACE/.dotfiles" "$HOME/.dotfiles"

      - name: Run validate (pre-bootstrap checks)
        run: |
          cd "$HOME/.dotfiles"
          ./script/validate

      - name: Run bootstrap (creates symlinks + gitconfig)
        run: |
          cd "$HOME/.dotfiles"
          ./script/bootstrap

      - name: Verify symlinks
        run: |
          for link in ~/.zshrc ~/.gitconfig ~/.gitignore ~/.vimrc ~/.tmux.conf; do
            if [ -L "$link" ]; then
              echo "ok $link -> $(readlink "$link")"
            else
              echo "fail: $link not a symlink" && exit 1
            fi
          done

      - name: Install Homebrew packages (Brewfile)
        run: |
          cd "$HOME/.dotfiles"
          ./homebrew/install.sh

      - name: Verify Homebrew packages
        run: |
          for tool in git git-lfs node uv gh fzf rg bat eza; do
            if command -v "$tool" &>/dev/null; then
              echo "ok $tool"
            else
              echo "fail: $tool not found" && exit 1
            fi
          done

      - name: Install Oh My Zsh + plugins
        run: |
          RUNZSH=no CHSH=no bash "$HOME/.dotfiles/zsh/install.sh"

      - name: Verify Oh My Zsh
        run: |
          [ -d "$HOME/.oh-my-zsh" ] && echo "ok oh-my-zsh" || (echo "fail: oh-my-zsh missing" && exit 1)
          [ -d "$HOME/.oh-my-zsh/custom/plugins/zsh-autosuggestions" ] && \
            echo "ok zsh-autosuggestions" || (echo "fail: zsh-autosuggestions missing" && exit 1)
          [ -d "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting" ] && \
            echo "ok zsh-syntax-highlighting" || (echo "fail: zsh-syntax-highlighting missing" && exit 1)

      - name: Install Python environment
        run: |
          bash "$HOME/.dotfiles/python/install.sh"

      - name: Verify Python toolchain
        run: |
          for tool in conda uv; do
            if command -v "$tool" &>/dev/null || \
               [ -f "/opt/homebrew/Caskroom/miniconda/base/bin/$tool" ]; then
              echo "ok $tool"
            else
              echo "warn: $tool not on PATH (may need shell reload)"
            fi
          done

      - name: Install AI CLIs (Claude Code, Gemini, Codex)
        run: |
          bash "$HOME/.dotfiles/claude/install.sh"
          bash "$HOME/.dotfiles/gemini/install.sh"
          bash "$HOME/.dotfiles/openai/install.sh"

      - name: Verify AI CLIs installed
        run: |
          for tool in claude gemini codex; do
            if command -v "$tool" &>/dev/null; then
              echo "ok $tool"
            else
              echo "fail: $tool not found" && exit 1
            fi
          done

      - name: Install GitHub CLI Copilot extension
        run: |
          bash "$HOME/.dotfiles/github/install.sh" || true

      - name: Install VS Code extensions
        run: |
          if command -v code-insiders &>/dev/null || command -v code &>/dev/null; then
            bash "$HOME/.dotfiles/vscode/install.sh" || true
          else
            echo "VS Code not installed on runner — skipping"
          fi

      - name: Test script/unlink --dry-run
        run: |
          cd "$HOME/.dotfiles"
          ./script/unlink --dry-run

      - name: Create local config stubs
        run: |
          touch "$HOME/.zshrc.local"
          touch "$HOME/.gitconfig.local"

      - name: Run verify script
        run: |
          bash "$HOME/.dotfiles/script/verify" || true
